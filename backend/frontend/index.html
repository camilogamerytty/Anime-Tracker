<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AnimeTracker - Gestiona tus animes</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#3b82f6">
</head>
<body>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1>📺 AnimeTracker</h1>
            <button id="darkModeToggle" class="dark-mode-btn">🌙</button>
        </header>
        <!-- Botón flotante para agregar anime -->
        <button id="fab" class="fab">+</button>

        <!-- Navegación inferior -->
        <div class="bottom-nav">
            <button class="nav-item" data-filter="all">
                <span class="nav-icon">📺</span>
                <span>Todos</span>
            </button>
            <button class="nav-item" data-filter="por_ver">
                <span class="nav-icon">⏳</span>
                <span>Por ver</span>
            </button>
            <button class="nav-item" data-filter="visto">
                <span class="nav-icon">✅</span>
                <span>Visto</span>
            </button>
            <button class="nav-item" data-filter="quiero_ver">
                <span class="nav-icon">⭐</span>
                <span>Quiero ver</span>
            </button>
        </div>

        <!-- Formulario para agregar anime -->
        <div class="form-card">
            <div class="form-group">
                <div class="input-field">
                    <label>Título del anime</label>
                    <input type="text" id="titleInput" placeholder="Ej: Shingeki no Kyojin" autocomplete="off">
                </div>
                <div class="input-field">
                    <label>URL de imagen (opcional)</label>
                    <input type="text" id="imageInput" placeholder="https://ejemplo.com/imagen.jpg">
                </div>
                <div class="input-field">
                    <label>Estado</label>
                    <select id="statusInput">
                        <option value="por_ver">Por ver</option>
                        <option value="visto">Visto</option>
                        <option value="quiero_ver">Quiero ver</option>
                    </select>
                </div>
                <div class="input-field">
                    <label>Notas (opcional)</label>
                    <input type="text" id="notesInput" placeholder="Alguna nota...">
                </div>
                <button id="addBtn">➕ Agregar</button>
            </div>
        </div>

        <!-- Filtros -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all">Todos</button>
            <button class="filter-btn" data-filter="por_ver">Por ver</button>
            <button class="filter-btn" data-filter="visto">Visto</button>
            <button class="filter-btn" data-filter="quiero_ver">Quiero ver</button>
        </div>

        <!-- Grid de animes -->
        <div id="animeGrid" class="anime-grid"></div>
    </div>

    <!-- Modal para editar -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modalTitle">Editar anime</span>
                <span class="close-modal">&times;</span>
            </div>
            <div class="input-field">
                <label>Título</label>
                <input type="text" id="editTitle" placeholder="Título">
            </div>
            <div class="input-field">
                <label>URL de imagen</label>
                <input type="text" id="editImage" placeholder="URL de imagen">
            </div>
            <div class="input-field">
                <label>Estado</label>
                <select id="editStatus">
                    <option value="por_ver">Por ver</option>
                    <option value="visto">Visto</option>
                    <option value="quiero_ver">Quiero ver</option>
                </select>
            </div>
            <div class="input-field">
                <label>Notas</label>
                <input type="text" id="editNotes" placeholder="Notas">
            </div>
            <button id="saveEditBtn" style="margin-top: 1rem; width: 100%;">Guardar cambios</button>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js')
            .then(reg => console.log('Service Worker registrado', reg))
            .catch(err => console.error('Error al registrar SW', err));
    }
    </script>
</body>
</html>
